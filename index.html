<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#22a06b" />
    <meta name="description" content="智慧聯網寵物箱環境調控系統行動儀表板" />
    <title>智慧寵物箱</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="top-panel" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Pet IoT Dashboard</p>
          <h1 id="app-title">智慧寵物箱</h1>
        </div>
        <div class="connection-pill" id="connectionState">
          <span class="dot" aria-hidden="true"></span>
          <span>模擬資料</span>
        </div>
      </section>

      <section class="sensor-grid" aria-label="環境數值">
        <article class="metric-card temperature-card">
          <div class="metric-header">
            <span class="metric-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M14 14.76V5a4 4 0 1 0-8 0v9.76a6 6 0 1 0 8 0ZM10 3a2 2 0 0 1 2 2v10.62l.47.3a4 4 0 1 1-4.94 0l.47-.3V5a2 2 0 0 1 2-2Z"/></svg>
            </span>
            <span>溫度</span>
          </div>
          <div class="metric-value"><span id="temperatureValue">27.4</span><small>°C</small></div>
          <div class="metric-note" id="temperatureNote">舒適範圍</div>
        </article>

        <article class="metric-card humidity-card">
          <div class="metric-header">
            <span class="metric-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 2.5 7.3 8.44A7.25 7.25 0 1 0 16.7 8.44L12 2.5Zm0 3.24 3.13 3.95A5.25 5.25 0 1 1 8.87 9.7L12 5.74Z"/></svg>
            </span>
            <span>濕度</span>
          </div>
          <div class="metric-value"><span id="humidityValue">58</span><small>%</small></div>
          <div class="metric-note">DHT11 感測</div>
        </article>
      </section>

      <section class="control-panel" aria-label="控制面板">
        <div class="section-title">
          <h2>風扇控制</h2>
          <span class="fan-status" id="fanStatus">OFF</span>
        </div>

        <div class="segmented-control" role="group" aria-label="控制模式">
          <button class="mode-button active" type="button" data-mode="auto" id="autoModeButton">自動</button>
          <button class="mode-button" type="button" data-mode="manual" id="manualModeButton">手動</button>
        </div>

        <div class="slider-card" id="autoPanel">
          <div class="slider-label">
            <label for="thresholdSlider">啟動溫度</label>
            <strong><span id="thresholdValue">28</span> °C</strong>
          </div>
          <input id="thresholdSlider" type="range" min="25" max="32" step="1" value="28" />
          <div class="range-labels" aria-hidden="true">
            <span>25 °C</span>
            <span>32 °C</span>
          </div>
        </div>

        <div class="manual-card disabled" id="manualPanel" aria-disabled="true">
          <button class="power-button" type="button" id="fanToggleButton">
            <span class="power-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M11 2h2v10h-2V2Zm6.66 3.76-1.42 1.42A7 7 0 1 1 7.76 7.18L6.34 5.76a9 9 0 1 0 11.32 0Z"/></svg>
            </span>
            <span id="fanToggleText">啟動風扇</span>
          </button>
        </div>
      </section>

      <section class="status-panel" aria-label="系統狀態">
        <div class="status-row">
          <span>控制模式</span>
          <strong id="modeText">自動</strong>
        </div>
        <div class="status-row">
          <span>更新時間</span>
          <strong id="updatedAt">--:--:--</strong>
        </div>
        <div class="status-row">
          <span>MQTT 主題</span>
          <strong class="topic-text" id="topicText">petbox/sensor</strong>
        </div>
      </section>
    </main>
  </body>
</html>
